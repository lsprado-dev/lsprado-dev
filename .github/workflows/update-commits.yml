name: Update Profile Dashboard

on:
  schedule:
    - cron: '0 */6 * * *' # Roda automaticamente a cada 6 horas
  workflow_dispatch: # Botão manual

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Global Data & Update
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # 1. Puxa seus commits globais de 2026
          QUERY='{"query": "query { user(login: \"lsprado-dev\") { contributionsCollection(from: \"2026-01-01T00:00:00Z\") { contributionCalendar { totalContributions } } } }"}'
          TOTAL_2026=$(curl -s -H "Authorization: bearer $GH_TOKEN" -X POST -d "$QUERY" https://api.github.com/graphql | jq '.data.user.contributionsCollection.contributionCalendar.totalContributions')
          
          # 2. Pega o horário atual forçando o fuso da Polônia
          LAST_UPDATED=$(TZ='Europe/Warsaw' date +'%Y-%m-%d %H:%M')

          # 3. Injeta os dados no README com a tag do país
          sed -i "s/2026_Commits-[0-9]*-/2026_Commits-${TOTAL_2026}-/g" README.md
          sed -i "s/Last updated: .* — <i>/Last updated: ${LAST_UPDATED} (Poland Time) — <i>/g" README.md

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated: Global stats & timezone sync"
          file_pattern: "README.md"
