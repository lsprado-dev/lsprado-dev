name: Update Profile Commits

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate 2026 Commits
        run: |
          # Conta os commits
          COMMITS=$(git rev-list --count --since="2026-01-01T00:00:00Z" --all)
          echo "Commits in 2026: $COMMITS"
          # Atualiza só o README
          sed -i "s/2026_Commits-[0-9]*-/2026_Commits-${COMMITS}-/g" README.md

      - name: Commit Updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated: Update 2026 commits badge"
          file_pattern: "README.md"
